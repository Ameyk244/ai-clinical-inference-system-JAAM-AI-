name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Set PYTHONPATH
      run: echo "PYTHONPATH=$PWD" >> $GITHUB_ENV

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests
      run: pytest tests/test_api_ci.py

    - name: Run inference script
      run: python scripts/run_inference.py 

    - name: Upload inference results
      uses: actions/upload-artifact@v4
      with:
         name: inference-results
         path: ci_results/

    - name: Upload GradCAM results
      uses: actions/upload-artifact@v4
      with:
        name: gradcam-results
        path: results/   

    # 🔥 OPTIONAL (but highly recommended)
    - name: Build Docker image
      run: docker build -t ai-clinical-app .